<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidSantara</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:radial-gradient(circle at top,#8a2be2 0%,#30004f 35%,#160021 70%,#000000 100%);
color:white;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(20,0,35,.75);
backdrop-filter:blur(10px);
border-bottom:2px solid #b300ff;
box-shadow:0 0 25px #b300ff;
z-index:999;
}

.logo-text{
display:flex;
align-items:center;
gap:12px;
font-size:32px;
font-weight:bold;
color:#d966ff;
text-shadow:0 0 15px #b300ff;
}

.logo-text img{
width:55px;
height:55px;
border-radius:50%;
border:2px solid #b300ff;
box-shadow:0 0 20px #b300ff;
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#d966ff;
text-shadow:0 0 15px #b300ff;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding-top:90px;
}

.hero img{
width:220px;
height:220px;
border-radius:50%;
border:6px solid #b300ff;
box-shadow:0 0 40px #b300ff;
margin-bottom:25px;
}

.hero h1{
font-size:72px;
color:#d966ff;
text-shadow:0 0 15px #b300ff,0 0 40px #b300ff;
}

.hero p{
font-size:24px;
margin-top:15px;
color:#ddd;
}

.buttons{
margin-top:35px;
}

button{
padding:15px 35px;
margin:10px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.join{
background:#8a2be2;
color:white;
box-shadow:0 0 20px #b300ff;
}

.join:hover{
transform:scale(1.08);
box-shadow:0 0 40px #d966ff;
}

.discord{
background:#5865F2;
color:white;
}

.discord:hover{
transform:scale(1.08);
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(70,0,120,.25);
backdrop-filter:blur(10px);
border:2px solid #b300ff;
border-radius:18px;
padding:30px;
margin-bottom:30px;
box-shadow:0 0 25px rgba(179,0,255,.5);
}

.card h2{
margin-bottom:20px;
color:#d966ff;
text-shadow:0 0 10px #b300ff;
}
